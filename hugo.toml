baseURL = 'https://fzk888.github.io/'
languageCode = 'zh-cn'
title = '方泽铠'
theme = 'PaperMod'

[params]
  env = "production"
  description = "AI 应用开发者，关注 RAG、Agent、Prompt Engineering 与真实产品落地。"
  author = "方泽铠"
  defaultTheme = "auto"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  showtoc = true
  tocopen = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/fzk888"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:zekai_ai@163.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.profileMode]
    enabled = true
    title = "方泽铠"
    subtitle = "人工智能专业在读，专注把大模型能力做成可靠、可用、可持续迭代的应用。这里记录我的技术实践、项目复盘和生活观察。"
    imageUrl = "/avatar.png"
    imageWidth = 150
    imageHeight = 150
    imageTitle = "方泽铠"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

